<!DOCTYPE html >
<html lang="vi" xmlns:th="https://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Success</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>



<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">

<div class="card shadow-lg p-5 text-center" style="max-width: 420px; border-radius: 20px;">
    <div class="mb-4">
        <i class="fas fa-circle-check text-success" style="font-size: 5rem;"></i>
    </div>

    <h2 class="card-title fw-bold text-success mb-3">Register Successfully!</h2>
    <p class="text-muted mb-4">
      Your Account is created success<br>Welcome!
    </p>
        <p th:text="${session.myuser?.username}">

</p>

    <a href="/home" class="btn btn-primary btn-lg w-100 mb-3">
        <i class="fas fa-home me-2"></i> Home
    </a>

    <a href="/showLoginPage" class="btn btn-outline-primary w-100">
        Login Now
    </a>
</div>

</body>


</html>
