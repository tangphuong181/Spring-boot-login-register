<!DOCTYPE html>
<html lang="en"  xmlns:th="https://www.thymeleaf.org/" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title> REGISTER - FORM</title> <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style> body {
        background: linear-gradient(135deg, #f3e7e9, #e3eeff);
    }
    .card {
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    } </style>



</head>


<body class="min-h-screen flex items-center justify-center p-4">

<div class="max-w-md w-full bg-white rounded-3xl card p-8">


    <div class="text-center mb-8"><h1 class="text-3xl font-bold text-gray-800"> WELCOME 👋</h1>
        <p class="text-gray-500 mt-2">Please, register this form</p>
    </div>

    <form id= "registerForm" th:action="@{/register/process}" th:object="${registerUser}" method="POST" class="space-y-6" novalidate > <!--  -->

        <div th:if= "${myError!=null}">
            <span th:text="${myError}" class="text-red-500 text-sm mt-1 ">
            </span>
        </div>
        <div>
            <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">User Name</label>

            <input type="text" th:field="*{username}" name="username"
                   class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-pink-400 transition"
                   placeholder="JohnPink6868"/>

            <span th:if="${#fields.hasErrors('username')}"
               th:errors="*{username}"
               class ="text-red-500 text-sm-mt-1">

            </span>


            </div>

            <div>

            <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
            <input type="text" id="firstName" th:field="*{firstname}" name="firstname"
                   class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-pink-400 transition"
                   placeholder="John"/>

                <span th:if="${#fields.hasErrors('firstname')}"
                   th:errors="*{firstname}"
                   class ="text-red-500 text-sm-mt-1">

                </span>

        </div>


        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
            <input type="text" th:field="*{lastname}" id="lastname" name="lastname"
                   class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-pink-400 transition" placeholder="Smith"
                  />

            <span th:if="${#fields.hasErrors('lastname')}"
               th:errors="*{lastname}"
               class ="text-red-500 text-sm-mt-1">

            </span>


        </div>


        <!-- Email -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" id="email" th:field="*{email}" name="email"
                   class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-pink-400 transition"
                   placeholder="ban@email.com"/>

            <span th:if="${#fields.hasErrors('email')}"
                  th:errors="*{email}"
                  class ="text-red-500 text-sm-mt-1">

            </span>

        </div>

        <!-- Mật khẩu (đã có validation) -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" th:field="*{password}" id="password" name="password" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-pink-400 transition"
                   placeholder="Password has low Character, Upper Character, Special Character in at least"  />


            <span th:if="${#fields.hasErrors('password')}"
                  th:errors="*{password}"
                  class ="text-red-500 text-sm-mt-1">

            </span>


        </div>


        <!-- Xác nhận mật khẩu -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password Confirm </label>
            <input type="password" id="confirmPassword" name="confirmPassword"
                   class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-pink-400 transition"
                   placeholder="Confirm the Password" required/>
            <p id="matchError" class="text-red-500 text-sm mt-1 hidden">The Password isn't match</p>
        </div>

            <br>


            <!-- Checkbox -->




            <div class="flex items-center">
                <input type="checkbox" id="terms" class="w-4 h-4 text-pink-500 border-gray-300 rounded focus:ring-pink-400" required> <label for="terms" class="ml-2 text-sm text-gray-600" > I Agree

                <a href="#" class="text-pink-500 hover:underline">with the Privacy</a> and <a href="#" class="text-pink-500 hover:underline">Secured Policy</a> </label>


        </div>
        <br>

        <!--Nút đăng ký -->


        <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-pink-400 to-purple-500 hover:from-pink-500 hover:to-purple-600 text-white font-semibold py-3.5 rounded-2xl transition-all duration-200 transform hover:scale-[1.02]">
            Create Account
        </button>
        </div>


    </form>
    <div class="text-center mt-6">
        <p class="text-sm text-gray-500"> Has the Account? <a href="#" class="text-pink-500 font-medium hover:underline">Login</a></p>
    </div>

</div>



<!-- Script kiểm tra mật khẩu đơn giản (chỉ demo) -->
<script>
    document.addEventListener('DOMContentLoaded', function () {

        // Các element
        const password = document.getElementById('password');
        const confirmPassword = document.getElementById('confirmPassword');
        const termsCheckbox = document.getElementById('terms');
        const matchError = document.getElementById('matchError');
        const submitBtn = document.getElementById('submitBtn');

        function validateForm() {
            let isValid = true;

            // 1. Kiểm tra password match
            if (confirmPassword.value !== '' && password.value !== confirmPassword.value) {
                matchError.classList.remove('hidden');
                isValid = false;
            } else {
                matchError.classList.add('hidden');
            }

            // 2. Kiểm tra checkbox đã tick chưa
            if (!termsCheckbox.checked) {
                isValid = false;
            }

            // Cập nhật trạng thái nút Submit
            submitBtn.disabled = !isValid;
        }

        // Gắn sự kiện realtime
        if (password) password.addEventListener('input', validateForm);
        if (confirmPassword) confirmPassword.addEventListener('input', validateForm);
        if (termsCheckbox) termsCheckbox.addEventListener('change', validateForm);

        // Ngăn submit nếu chưa thỏa mãn điều kiện
        const form = document.getElementById('registerForm');
        if (form) {
            form.addEventListener('submit', function (e) {
                validateForm(); // kiểm tra lại lần cuối

                if (submitBtn.disabled) {
                    e.preventDefault();

                    // Optional: hiện thông báo nếu chưa tick checkbox
                    if (!termsCheckbox.checked) {
                        alert("you have to agree with the condition!");
                    }
                }
            });
        }

        // Chạy lần đầu khi load form
        validateForm();
    });
</script>
</body>
</html>
